<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>opaso - text</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\

\[', '\\]

']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f3f4f6;
      --fg: #111827;
      --accent: #2563eb;
      --border: #d1d5db;
      --editor-width: min(900px, 100%);
    }
    :root.dark {
      --bg: #020617;
      --bg-alt: #0f172a;
      --fg: #e5e7eb;
      --accent: #38bdf8;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .left, .right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
    }

    input[type="text"], button, select {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button:hover, select:hover {
      filter: brightness(1.05);
    }

    #toolbar {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      justify-content: center;
      flex-wrap: wrap;
    }

    #toolbar button {
      font-size: 0.8rem;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0.75rem;
    }

    #editorShell {
      width: var(--editor-width);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      padding: 1rem 1.25rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    #editor {
      min-height: 70vh;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #editor:empty::before {
      content: "Start typing, or paste Markdown (with $...$ equations)…";
      color: #9ca3af;
    }

    #findReplace {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem;
      font-size: 0.8rem;
      box-shadow: 0 8px 20px rgba(15,23,42,0.15);
      display: none;
      z-index: 50;
    }
    #findReplace input {
      width: 160px;
      margin-bottom: 0.25rem;
    }
    #findReplace button {
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <h1>opaso - text</h1>
    <input id="docTitle" type="text" placeholder="Untitled document" />
    <button id="newBtn">New</button>
    <button id="saveBtn" class="primary">Save</button>
    <select id="openSelect"><option value="">Open…</option></select>
  </div>
  <div class="right">
    <button id="exportHTML">Export HTML</button>
    <button id="exportPDF">Export PDF</button>
    <button id="themeBtn">🌙 Night</button>
  </div>
</header>

<div id="toolbar">
  <button id="boldBtn"><b>B</b></button>
  <button id="italicBtn"><i>I</i></button>
  <button id="underlineBtn"><u>U</u></button>
  <button id="headingBtn">H</button>
  <button id="ulBtn">• List</button>
  <button id="olBtn">1. List</button>
  <button id="codeBtn">Code</button>
  <button id="quoteBtn">Quote</button>
  <button id="hrBtn">HR</button>
  <button id="eqBtn">Equation</button>
  <button id="imgBtn">Image</button>
  <button id="tableBtn">Table</button>
  <button id="findBtn">Find/Replace</button>
</div>

<main>
  <div id="editorShell">
    <div id="editor" contenteditable="true"></div>
  </div>
</main>

<div id="findReplace">
  <div><strong>Find & Replace</strong></div>
  <input id="findText" type="text" placeholder="Find…" /><br />
  <input id="replaceText" type="text" placeholder="Replace with…" /><br />
  <button id="doFindBtn">Find</button>
  <button id="doReplaceBtn">Replace</button>
  <button id="closeFindBtn">Close</button>
</div>

<script>
  // DOM refs
  const editor = document.getElementById("editor");
  const docTitle = document.getElementById("docTitle");
  const newBtn = document.getElementById("newBtn");
  const saveBtn = document.getElementById("saveBtn");
  const openSelect = document.getElementById("openSelect");
  const exportHTML = document.getElementById("exportHTML");
  const exportPDF = document.getElementById("exportPDF");
  const themeBtn = document.getElementById("themeBtn");

  const boldBtn = document.getElementById("boldBtn");
  const italicBtn = document.getElementById("italicBtn");
  const underlineBtn = document.getElementById("underlineBtn");
  const headingBtn = document.getElementById("headingBtn");
  const ulBtn = document.getElementById("ulBtn");
  const olBtn = document.getElementById("olBtn");
  const codeBtn = document.getElementById("codeBtn");
  const quoteBtn = document.getElementById("quoteBtn");
  const hrBtn = document.getElementById("hrBtn");
  const eqBtn = document.getElementById("eqBtn");
  const imgBtn = document.getElementById("imgBtn");
  const tableBtn = document.getElementById("tableBtn");
  const findBtn = document.getElementById("findBtn");

  const findReplaceBox = document.getElementById("findReplace");
  const findInput = document.getElementById("findText");
  const replaceInput = document.getElementById("replaceText");
  const doFindBtn = document.getElementById("doFindBtn");
  const doReplaceBtn = document.getElementById("doReplaceBtn");
  const closeFindBtn = document.getElementById("closeFindBtn");

  // Formatting helpers
  function exec(cmd, value = null) {
    document.execCommand(cmd, false, value);
  }

  function typesetMath() {
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([editor]).catch(() => {});
    }
  }

  // Toolbar actions
  boldBtn.onclick = () => exec("bold");
  italicBtn.onclick = () => exec("italic");
  underlineBtn.onclick = () => exec("underline");
  headingBtn.onclick = () => exec("formatBlock", "h2");
  ulBtn.onclick = () => exec("insertUnorderedList");
  olBtn.onclick = () => exec("insertOrderedList");
  codeBtn.onclick = () => exec("insertHTML", "<pre><code>code here</code></pre>");
  quoteBtn.onclick = () => exec("formatBlock", "blockquote");
  hrBtn.onclick = () => exec("insertHorizontalRule");
  eqBtn.onclick = () => {
    exec("insertHTML", "<p>$your\\ equation\\ here$</p>");
    typesetMath();
  };
  imgBtn.onclick = () => {
    const url = prompt("Image URL:");
    if (!url) return;
    exec("insertHTML", `<p><img src="${url}" alt="image" style="max-width:100%;"/></p>`);
  };
  tableBtn.onclick = () => {
    const rows = 3, cols = 3;
    let html = "<table border='1' style='border-collapse:collapse;width:100%;'>";
    for (let r = 0; r < rows; r++) {
      html += "<tr>";
      for (let c = 0; c < cols; c++) {
        html += "<td style='padding:4px;'>Cell</td>";
      }
      html += "</tr>";
    }
    html += "</table>";
    exec("insertHTML", html);
  };

  // Find & Replace
  function toggleFindReplace() {
    const visible = findReplaceBox.style.display === "block";
    findReplaceBox.style.display = visible ? "none" : "block";
    if (!visible) findInput.focus();
  }
  findBtn.onclick = toggleFindReplace;
  closeFindBtn.onclick = () => (findReplaceBox.style.display = "none");

  doFindBtn.onclick = () => {
    const text = findInput.value;
    if (!text) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
    let node;
    while ((node = walker.nextNode())) {
      const idx = node.textContent.toLowerCase().indexOf(text.toLowerCase());
      if (idx !== -1) {
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, idx + text.length);
        sel.addRange(range);
        break;
      }
    }
  };

  doReplaceBtn.onclick = () => {
    const findText = findInput.value;
    const replaceText = replaceInput.value;
    if (!findText) return;
    const re = new RegExp(findText.replace(/[.*+?^${}()|[\]

\\]

/g, "\\$&"), "gi");
    editor.innerHTML = editor.innerHTML.replace(re, replaceText);
    typesetMath();
  };

  // Markdown paste
  editor.addEventListener("paste", (e) => {
    const text = e.clipboardData && e.clipboardData.getData("text/plain");
    if (!text) return;
    e.preventDefault();
    const html = marked.parse(text);
    exec("insertHTML", html);
    typesetMath();
  });

  // Storage & autosave
  const STORAGE_KEY = "opaso-text-documents";
  const ACTIVE_KEY = "opaso-text-active-id";
  let docs = {};
  try {
    docs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    docs = {};
  }
  let activeId = localStorage.getItem(ACTIVE_KEY) || null;

  function saveDocs() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
  }

  function refreshOpenSelect() {
    openSelect.innerHTML = '<option value="">Open…</option>';
    Object.entries(docs).forEach(([id, doc]) => {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = doc.title;
      openSelect.appendChild(opt);
    });
  }

  function loadDoc(id) {
    const doc = docs[id];
    if (!doc) return;
    activeId = id;
    localStorage.setItem(ACTIVE_KEY, id);
    docTitle.value = doc.title;
    editor.innerHTML = doc.html;
    typesetMath();
    refreshOpenSelect();
    openSelect.value = id;
  }

  function newDoc() {
    activeId = null;
    localStorage.removeItem(ACTIVE_KEY);
    docTitle.value = "";
    editor.innerHTML = "";
    refreshOpenSelect();
  }

  function saveDoc() {
    const title = docTitle.value.trim() || "Untitled";
    const html = editor.innerHTML;
    if (!activeId) activeId = "doc-" + Date.now();
    docs[activeId] = { title, html };
    saveDocs();
    localStorage.setItem(ACTIVE_KEY, activeId);
    refreshOpenSelect();
    openSelect.value = activeId;
  }

  newBtn.onclick = () => {
    if (editor.innerText.trim() || docTitle.value.trim()) {
      if (!confirm("Discard current document and start a new one?")) return;
    }
    newDoc();
  };

  saveBtn.onclick = saveDoc;

  openSelect.onchange = () => {
    const id = openSelect.value;
    if (!id) return;
    loadDoc(id);
  };

  // Autosave every 10s
  setInterval(() => {
    if (!docTitle.value.trim() && !editor.innerText.trim()) return;
    saveDoc();
  }, 10000);

  // Export
  exportHTML.onclick = () => {
    const blob = new Blob([editor.innerHTML], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (docTitle.value || "document") + ".html";
    a.click();
  };

  exportPDF.onclick = () => {
    window.print();
  };

  // Theme
  function applyTheme(t) {
    document.documentElement.classList.toggle("dark", t === "dark");
    themeBtn.textContent = t === "dark" ? "☀️ Day" : "🌙 Night";
  }
  let theme = localStorage.getItem("opaso-theme") || "light";
  applyTheme(theme);
  themeBtn.onclick = () => {
    theme = theme === "dark" ? "light" : "dark";
    localStorage.setItem("opaso-theme", theme);
    applyTheme(theme);
  };

  // Init
  refreshOpenSelect();
  if (activeId && docs[activeId]) {
    loadDoc(activeId);
  } else {
    editor.innerHTML = `
<h2>Welcome to opaso - text</h2>
<p>Type, paste Markdown, add equations like $Distance = Speed \\times Time$.</p>
<ul>
  <li>Toolbar: bold, headings, lists, code, quote, HR, equations, images, tables.</li>
  <li>Autosave, find & replace, export HTML/PDF, day/night theme.</li>
</ul>`;
    typesetMath();
  }
</script>

</body>
</html>
