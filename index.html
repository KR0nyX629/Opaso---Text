<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>opaso - text</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\

\[', '\\]

']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f3f4f6;
      --fg: #111827;
      --accent: #2563eb;
      --border: #d1d5db;
      --editor-width: min(900px, 100%);
    }
    :root.dark {
      --bg: #020617;
      --bg-alt: #0f172a;
      --fg: #e5e7eb;
      --accent: #38bdf8;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .left, .right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
    }

    input[type="text"], button, select {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button:hover, select:hover {
      filter: brightness(1.05);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0.75rem;
    }

    #shell {
      width: var(--editor-width);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      padding: 1rem 1.25rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #editor {
      width: 100%;
      min-height: 40vh;
      resize: vertical;
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--fg);
    }

    #preview {
      width: 100%;
      min-height: 40vh;
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 0.75rem;
      background: var(--bg-alt);
      overflow: auto;
    }

    #preview h1, #preview h2, #preview h3 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25rem;
    }

    #preview pre {
      background: var(--bg);
      padding: 0.5rem;
      border-radius: 4px;
      overflow: auto;
    }

    #preview code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #preview a {
      color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <h1>opaso - text</h1>
    <input id="docTitle" type="text" placeholder="Untitled document" />
    <button id="newBtn">New</button>
    <button id="saveBtn" class="primary">Save</button>
    <select id="openSelect"><option value="">Open…</option></select>
  </div>
  <div class="right">
    <button id="exportHTML">Export HTML</button>
    <button id="exportPDF">Export PDF</button>
    <button id="themeBtn">🌙 Night</button>
  </div>
</header>

<main>
  <div id="shell">
    <textarea id="editor" placeholder="# Start typing or paste Markdown with $equations$…"></textarea>
    <div id="preview"></div>
  </div>
</main>

<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");
  const docTitle = document.getElementById("docTitle");
  const newBtn = document.getElementById("newBtn");
  const saveBtn = document.getElementById("saveBtn");
  const openSelect = document.getElementById("openSelect");
  const exportHTML = document.getElementById("exportHTML");
  const exportPDF = document.getElementById("exportPDF");
  const themeBtn = document.getElementById("themeBtn");

  const STORAGE_KEY = "opaso-text-documents";
  const ACTIVE_KEY = "opaso-text-active-id";
  const THEME_KEY = "opaso-text-theme";

  let docs = {};
  try {
    docs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    docs = {};
  }
  let activeId = localStorage.getItem(ACTIVE_KEY) || null;

  function typesetMath() {
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([preview]).catch(() => {});
    }
  }

  function render() {
    const text = editor.value;
    preview.innerHTML = marked.parse(text, { breaks: true });
    typesetMath();
  }

  editor.addEventListener("input", render);

  function saveDocs() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
  }

  function refreshOpenSelect() {
    openSelect.innerHTML = '<option value="">Open…</option>';
    Object.entries(docs).forEach(([id, doc]) => {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = doc.title;
      openSelect.appendChild(opt);
    });
  }

  function loadDoc(id) {
    const doc = docs[id];
    if (!doc) return;
    activeId = id;
    localStorage.setItem(ACTIVE_KEY, id);
    docTitle.value = doc.title;
    editor.value = doc.content;
    render();
    refreshOpenSelect();
    openSelect.value = id;
  }

  function newDoc() {
    activeId = null;
    localStorage.removeItem(ACTIVE_KEY);
    docTitle.value = "";
    editor.value = "";
    render();
    refreshOpenSelect();
  }

  function saveDoc() {
    const title = docTitle.value.trim() || "Untitled";
    const content = editor.value;
    if (!activeId) activeId = "doc-" + Date.now();
    docs[activeId] = { title, content };
    saveDocs();
    localStorage.setItem(ACTIVE_KEY, activeId);
    refreshOpenSelect();
    openSelect.value = activeId;
  }

  newBtn.onclick = () => {
    if (editor.value.trim() || docTitle.value.trim()) {
      if (!confirm("Discard current document and start a new one?")) return;
    }
    newDoc();
  };

  saveBtn.onclick = saveDoc;

  openSelect.onchange = () => {
    const id = openSelect.value;
    if (!id) return;
    loadDoc(id);
  };

  // Autosave every 10s
  setInterval(() => {
    if (!docTitle.value.trim() && !editor.value.trim()) return;
    saveDoc();
  }, 10000);

  // Export
  exportHTML.onclick = () => {
    const html = preview.innerHTML;
    const blob = new Blob([html], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (docTitle.value || "document") + ".html";
    a.click();
  };

  exportPDF.onclick = () => {
    window.print();
  };

  // Theme
  function applyTheme(t) {
    document.documentElement.classList.toggle("dark", t === "dark");
    themeBtn.textContent = t === "dark" ? "☀️ Day" : "🌙 Night";
  }
  let theme = localStorage.getItem(THEME_KEY) || "light";
  applyTheme(theme);
  themeBtn.onclick = () => {
    theme = theme === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, theme);
    applyTheme(theme);
  };

  // Initial load
  refreshOpenSelect();
  if (activeId && docs[activeId]) {
    loadDoc(activeId);
  } else {
    editor.value =
`# opaso - text

Type or paste **Markdown** here. It renders below.

**Speed, Distance, Time**
*   $Distance = Speed \\times Time$
*   $Speed = \\frac{Distance}{Time}$
*   $Time = \\frac{Distance}{Speed}$

**Algebra**
*   **Slope (Gradient):** $m = \\frac{rise}{run} = \\frac{y_2 - y_1}{x_2 - x_1}$
*   **Midpoint:** $(\\frac{x_1 + x_2}{2}, \\frac{y_1 + y_2}{2})$

**Other**
*   **Mean (Average):** $\\frac{\\text{Sum of numbers}}{\\text{Total count}}$
*   **Sum of Angles in Polygon:** $(n - 2) \\times 180^\\circ$`;
    render();
  }
</script>

</body>
</html>
