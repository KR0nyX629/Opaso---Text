<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>opaso - text</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Quill editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\

\[', '\\]

']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f3f4f6;
      --fg: #111827;
      --accent: #2563eb;
      --border: #d1d5db;
      --editor-width: min(900px, 100%);
    }
    :root.dark {
      --bg: #020617;
      --bg-alt: #0f172a;
      --fg: #e5e7eb;
      --accent: #38bdf8;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .left, .right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
    }

    input[type="text"], button, select {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button:hover, select:hover {
      filter: brightness(1.05);
    }

    #toolbar {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      justify-content: center;
      flex-wrap: wrap;
    }

    #toolbar button {
      font-size: 0.8rem;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0.75rem;
    }

    #editorShell {
      width: var(--editor-width);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      padding: 1rem 1.25rem;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    #editor {
      min-height: 70vh;
    }

    .ql-editor {
      min-height: 70vh;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--fg);
      background: var(--bg);
    }

    .ql-container.ql-snow {
      border: none;
    }

    #editor:empty::before,
    .ql-editor.ql-blank::before {
      content: "Start typing, or paste Markdown (with $...$ equations)…";
      color: #9ca3af;
      pointer-events: none;
    }

    #findReplace {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem;
      font-size: 0.8rem;
      box-shadow: 0 8px 20px rgba(15,23,42,0.15);
      display: none;
      z-index: 50;
    }
    #findReplace input {
      width: 160px;
      margin-bottom: 0.25rem;
    }
    #findReplace button {
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<header>
  <div class="left">
    <h1>opaso - text</h1>
    <input id="docTitle" type="text" placeholder="Untitled document" />
    <button id="newBtn">New</button>
    <button id="saveBtn" class="primary">Save</button>
    <select id="openSelect"><option value="">Open…</option></select>
  </div>
  <div class="right">
    <button id="exportHTML">Export HTML</button>
    <button id="exportPDF">Export PDF</button>
    <button id="themeBtn">🌙 Night</button>
  </div>
</header>

<div id="toolbar">
  <button id="boldBtn"><b>B</b></button>
  <button id="italicBtn"><i>I</i></button>
  <button id="underlineBtn"><u>U</u></button>
  <button id="headingBtn">H</button>
  <button id="ulBtn">• List</button>
  <button id="olBtn">1. List</button>
  <button id="codeBtn">Code</button>
  <button id="quoteBtn">Quote</button>
  <button id="hrBtn">HR</button>
  <button id="eqBtn">Equation</button>
  <button id="imgBtn">Image</button>
  <button id="tableBtn">Table</button>
  <button id="findBtn">Find/Replace</button>
</div>

<main>
  <div id="editorShell">
    <div id="editor"></div>
  </div>
</main>

<div id="findReplace">
  <div><strong>Find & Replace</strong></div>
  <input id="findText" type="text" placeholder="Find…" /><br />
  <input id="replaceText" type="text" placeholder="Replace with…" /><br />
  <button id="doFindBtn">Find</button>
  <button id="doReplaceBtn">Replace</button>
  <button id="closeFindBtn">Close</button>
</div>

<script>
  // --- Quill init ---
  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: false
    }
  });

  const editorRoot = quill.root;

  // --- MathJax ---
  function typesetMath() {
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([editorRoot]).catch(() => {});
    }
  }

  quill.on('text-change', () => {
    typesetMath();
  });

  // --- DOM refs ---
  const docTitle = document.getElementById("docTitle");
  const newBtn = document.getElementById("newBtn");
  const saveBtn = document.getElementById("saveBtn");
  const openSelect = document.getElementById("openSelect");
  const exportHTML = document.getElementById("exportHTML");
  const exportPDF = document.getElementById("exportPDF");
  const themeBtn = document.getElementById("themeBtn");

  const boldBtn = document.getElementById("boldBtn");
  const italicBtn = document.getElementById("italicBtn");
  const underlineBtn = document.getElementById("underlineBtn");
  const headingBtn = document.getElementById("headingBtn");
  const ulBtn = document.getElementById("ulBtn");
  const olBtn = document.getElementById("olBtn");
  const codeBtn = document.getElementById("codeBtn");
  const quoteBtn = document.getElementById("quoteBtn");
  const hrBtn = document.getElementById("hrBtn");
  const eqBtn = document.getElementById("eqBtn");
  const imgBtn = document.getElementById("imgBtn");
  const tableBtn = document.getElementById("tableBtn");
  const findBtn = document.getElementById("findBtn");

  const findReplaceBox = document.getElementById("findReplace");
  const findInput = document.getElementById("findText");
  const replaceInput = document.getElementById("replaceText");
  const doFindBtn = document.getElementById("doFindBtn");
  const doReplaceBtn = document.getElementById("doReplaceBtn");
  const closeFindBtn = document.getElementById("closeFindBtn");

  // --- Toolbar actions (Quill formats) ---
  boldBtn.onclick = () => quill.format('bold', !quill.getFormat().bold);
  italicBtn.onclick = () => quill.format('italic', !quill.getFormat().italic);
  underlineBtn.onclick = () => quill.format('underline', !quill.getFormat().underline);

  headingBtn.onclick = () => {
    const f = quill.getFormat();
    quill.format('header', f.header === 2 ? false : 2);
  };

  ulBtn.onclick = () => {
    const f = quill.getFormat();
    quill.format('list', f.list === 'bullet' ? false : 'bullet');
  };

  olBtn.onclick = () => {
    const f = quill.getFormat();
    quill.format('list', f.list === 'ordered' ? false : 'ordered');
  };

  codeBtn.onclick = () => {
    const f = quill.getFormat();
    quill.format('code-block', !f['code-block']);
  };

  quoteBtn.onclick = () => {
    const f = quill.getFormat();
    quill.format('blockquote', !f.blockquote);
  };

  hrBtn.onclick = () => {
    const range = quill.getSelection(true);
    quill.insertEmbed(range.index, 'divider', true, 'user');
    quill.insertText(range.index + 1, '\n', 'user');
  };

  // Custom blot for HR
  const BlockEmbed = Quill.import('blots/block/embed');
  class DividerBlot extends BlockEmbed {}
  DividerBlot.blotName = 'divider';
  DividerBlot.tagName = 'hr';
  Quill.register(DividerBlot);

  eqBtn.onclick = () => {
    const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
    quill.insertText(range.index, '$your equation here$', 'user');
    quill.setSelection(range.index + 1, 0, 'user');
    typesetMath();
  };

  imgBtn.onclick = () => {
    const url = prompt("Image URL:");
    if (!url) return;
    const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
    quill.insertEmbed(range.index, 'image', url, 'user');
    quill.setSelection(range.index + 1, 0, 'user');
  };

  tableBtn.onclick = () => {
    // Simple HTML table insert via clipboard API
    const tableHTML = `
<table border="1" style="border-collapse:collapse;width:100%;">
  <tr><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td></tr>
  <tr><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td></tr>
  <tr><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td><td style="padding:4px;">Cell</td></tr>
</table><p></p>`;
    const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
    quill.clipboard.dangerouslyPasteHTML(range.index, tableHTML);
  };

  // --- Find & Replace ---
  function toggleFindReplace() {
    const visible = findReplaceBox.style.display === "block";
    findReplaceBox.style.display = visible ? "none" : "block";
    if (!visible) findInput.focus();
  }
  findBtn.onclick = toggleFindReplace;
  closeFindBtn.onclick = () => (findReplaceBox.style.display = "none");

  doFindBtn.onclick = () => {
    const text = findInput.value;
    if (!text) return;
    const html = editorRoot.innerHTML;
    const idx = html.toLowerCase().indexOf(text.toLowerCase());
    if (idx === -1) {
      alert("Not found");
      return;
    }
    // crude: scroll to first match
    const range = quill.getSelection(true) || { index: 0, length: 0 };
    quill.setSelection(range.index, 0);
    editorRoot.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  doReplaceBtn.onclick = () => {
    const findText = findInput.value;
    const replaceText = replaceInput.value;
    if (!findText) return;
    const re = new RegExp(findText.replace(/[.*+?^${}()|[\]

\\]

/g, "\\$&"), "gi");
    const html = editorRoot.innerHTML;
    editorRoot.innerHTML = html.replace(re, replaceText);
    quill.setContents(quill.clipboard.convert(editorRoot.innerHTML));
    typesetMath();
  };

  // --- Markdown paste ---
  editorRoot.addEventListener("paste", (e) => {
    const text = e.clipboardData && e.clipboardData.getData("text/plain");
    if (!text) return;
    e.preventDefault();
    const html = marked.parse(text);
    const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
    quill.clipboard.dangerouslyPasteHTML(range.index, html);
  });

  // --- Storage & autosave ---
  const STORAGE_KEY = "opaso-text-documents";
  const ACTIVE_KEY = "opaso-text-active-id";
  let docs = {};
  try {
    docs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    docs = {};
  }
  let activeId = localStorage.getItem(ACTIVE_KEY) || null;

  function saveDocs() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
  }

  function refreshOpenSelect() {
    openSelect.innerHTML = '<option value="">Open…</option>';
    Object.entries(docs).forEach(([id, doc]) => {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = doc.title;
      openSelect.appendChild(opt);
    });
  }

  function loadDoc(id) {
    const doc = docs[id];
    if (!doc) return;
    activeId = id;
    localStorage.setItem(ACTIVE_KEY, id);
    docTitle.value = doc.title;
    quill.setContents(quill.clipboard.convert(doc.html || ""));
    typesetMath();
    refreshOpenSelect();
    openSelect.value = id;
  }

  function newDoc() {
    activeId = null;
    localStorage.removeItem(ACTIVE_KEY);
    docTitle.value = "";
    quill.setText("");
    refreshOpenSelect();
  }

  function saveDoc() {
    const title = docTitle.value.trim() || "Untitled";
    const html = editorRoot.innerHTML;
    if (!activeId) activeId = "doc-" + Date.now();
    docs[activeId] = { title, html };
    saveDocs();
    localStorage.setItem(ACTIVE_KEY, activeId);
    refreshOpenSelect();
    openSelect.value = activeId;
  }

  newBtn.onclick = () => {
    if (quill.getText().trim() || docTitle.value.trim()) {
      if (!confirm("Discard current document and start a new one?")) return;
    }
    newDoc();
  };

  saveBtn.onclick = saveDoc;

  openSelect.onchange = () => {
    const id = openSelect.value;
    if (!id) return;
    loadDoc(id);
  };

  // Autosave every 10s
  setInterval(() => {
    if (!docTitle.value.trim() && !quill.getText().trim()) return;
    saveDoc();
  }, 10000);

  // --- Export ---
  exportHTML.onclick = () => {
    const blob = new Blob([editorRoot.innerHTML], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (docTitle.value || "document") + ".html";
    a.click();
  };

  exportPDF.onclick = () => {
    window.print();
  };

  // --- Theme ---
  function applyTheme(t) {
    document.documentElement.classList.toggle("dark", t === "dark");
    themeBtn.textContent = t === "dark" ? "☀️ Day" : "🌙 Night";
  }
  let theme = localStorage.getItem("opaso-theme") || "light";
  applyTheme(theme);
  themeBtn.onclick = () => {
    theme = theme === "dark" ? "light" : "dark";
    localStorage.setItem("opaso-theme", theme);
    applyTheme(theme);
  };

  // --- Init ---
  refreshOpenSelect();
  if (activeId && docs[activeId]) {
    loadDoc(activeId);
  } else {
    const starter = `
<h2><strong>opaso - text</strong></h2>
<p>Type, paste Markdown, and use equations like $Distance = Speed \\times Time$.</p>
<ul>
  <li><strong>Speed, Distance, Time</strong>: $Distance = Speed \\times Time$</li>
  <li><strong>Slope:</strong> $m = \\frac{y_2 - y_1}{x_2 - x_1}$</li>
  <li><strong>Mean:</strong> $\\frac{\\text{Sum of numbers}}{\\text{Total count}}$</li>
</ul>`;
    quill.clipboard.dangerouslyPasteHTML(0, starter);
    typesetMath();
  }
</script>

</body>
</html>
