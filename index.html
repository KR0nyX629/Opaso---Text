<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>opaso - text</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- MIT License: You are free to use, modify, and distribute this file. -->

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax for LaTeX equations -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\

\[', '\\]

']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f3f4f6;
      --fg: #111827;
      --accent: #2563eb;
      --border: #d1d5db;
      --editor-width: min(900px, 100%);
    }
    :root.dark {
      --bg: #020617;
      --bg-alt: #0f172a;
      --fg: #e5e7eb;
      --accent: #38bdf8;
      --border: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      gap: 0.75rem;
    }

    .left, .right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
    }

    input[type="text"] {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      min-width: 10rem;
    }

    button, select {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.85rem;
    }

    button.primary {
      background: var(--accent);
      color: #f9fafb;
      border-color: var(--accent);
    }

    button:hover, select:hover {
      filter: brightness(1.05);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 0.75rem;
    }

    #editorShell {
      width: var(--editor-width);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      padding: 1rem 1.25rem;
      margin: 0 auto;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    #editor {
      min-height: 70vh;
      outline: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #editor:empty::before {
      content: "Start typing, or paste Markdown (with $...$ equations)…";
      color: #9ca3af;
    }

    #editor h1, #editor h2, #editor h3 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25rem;
    }

    #editor pre {
      background: var(--bg-alt);
      padding: 0.5rem;
      border-radius: 4px;
      overflow: auto;
    }

    #editor code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #editor a {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
      }
      .left {
        flex: 1 1 100%;
      }
      .right {
        justify-content: flex-end;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <h1>opaso - text</h1>
      <input id="docTitle" type="text" placeholder="Untitled document" />
      <button id="newBtn">New</button>
      <button id="saveBtn" class="primary">Save</button>
      <select id="openSelect">
        <option value="">Open…</option>
      </select>
    </div>
    <div class="right">
      <button id="themeBtn">🌙 Night</button>
    </div>
  </header>

  <main>
    <div id="editorShell">
      <div id="editor" contenteditable="true"></div>
    </div>
  </main>

  <script>
    // --- Storage keys -------------------------------------------------------
    const STORAGE_KEY = "opaso-text-documents";
    const THEME_KEY = "opaso-text-theme";
    const ACTIVE_KEY = "opaso-text-active-id";

    // --- Storage helpers ----------------------------------------------------
    function loadDocs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveDocs(docs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
    }

    function generateId() {
      return "doc-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
    }

    // --- DOM references -----------------------------------------------------
    const editor = document.getElementById("editor");
    const docTitleInput = document.getElementById("docTitle");
    const newBtn = document.getElementById("newBtn");
    const saveBtn = document.getElementById("saveBtn");
    const openSelect = document.getElementById("openSelect");
    const themeBtn = document.getElementById("themeBtn");

    let docs = loadDocs();
    let activeId = localStorage.getItem(ACTIVE_KEY) || null;

    // --- Markdown paste handling -------------------------------------------
    function typesetMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([editor]).catch(() => {});
      }
    }

    editor.addEventListener("paste", (e) => {
      const text = e.clipboardData && e.clipboardData.getData("text/plain");
      if (!text) return;

      e.preventDefault();

      // Convert pasted Markdown to HTML
      const html = marked.parse(text, { breaks: true });

      // Insert HTML at caret
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) {
        editor.insertAdjacentHTML("beforeend", html);
      } else {
        const range = selection.getRangeAt(0);
        range.deleteContents();
        const temp = document.createElement("div");
        temp.innerHTML = html;
        const frag = document.createDocumentFragment();
        let node;
        while ((node = temp.firstChild)) {
          frag.appendChild(node);
        }
        range.insertNode(frag);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      typesetMath();
    });

    // When content changes (typing), re-run MathJax for new formulas
    editor.addEventListener("input", () => {
      typesetMath();
    });

    // --- Document management -----------------------------------------------
    function refreshOpenSelect() {
      const current = openSelect.value;
      openSelect.innerHTML = '<option value="">Open…</option>';
      Object.entries(docs)
        .sort((a, b) => (a[1].updated || 0) < (b[1].updated || 0) ? 1 : -1)
        .forEach(([id, doc]) => {
          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = doc.title || "Untitled";
          openSelect.appendChild(opt);
        });
      if (current && docs[current]) openSelect.value = current;
    }

    function loadDoc(id) {
      const doc = docs[id];
      if (!doc) return;
      activeId = id;
      localStorage.setItem(ACTIVE_KEY, id);
      docTitleInput.value = doc.title || "";
      editor.innerHTML = doc.html || "";
      typesetMath();
      refreshOpenSelect();
      openSelect.value = id;
    }

    function newDoc() {
      activeId = null;
      localStorage.removeItem(ACTIVE_KEY);
      docTitleInput.value = "";
      editor.innerHTML = "";
      refreshOpenSelect();
      openSelect.value = "";
    }

    function saveDoc() {
      const title = docTitleInput.value.trim() || "Untitled";
      const html = editor.innerHTML;
      const now = Date.now();

      if (!activeId) {
        activeId = generateId();
      }

      docs[activeId] = { title, html, updated: now };
      saveDocs(docs);
      localStorage.setItem(ACTIVE_KEY, activeId);
      refreshOpenSelect();
      openSelect.value = activeId;
    }

    newBtn.addEventListener("click", () => {
      if (editor.innerText.trim() || docTitleInput.value.trim()) {
        const ok = confirm("Discard current document and start a new one?");
        if (!ok) return;
      }
      newDoc();
    });

    saveBtn.addEventListener("click", saveDoc);

    openSelect.addEventListener("change", () => {
      const id = openSelect.value;
      if (!id) return;
      loadDoc(id);
    });

    docTitleInput.addEventListener("input", () => {
      if (!activeId || !docs[activeId]) return;
      docs[activeId].title = docTitleInput.value;
      docs[activeId].updated = Date.now();
      saveDocs(docs);
      refreshOpenSelect();
      openSelect.value = activeId;
    });

    // --- Theme handling -----------------------------------------------------
    function applyTheme(theme) {
      const root = document.documentElement;
      if (theme === "dark") {
        root.classList.add("dark");
        themeBtn.textContent = "☀️ Day";
      } else {
        root.classList.remove("dark");
        themeBtn.textContent = "🌙 Night";
      }
    }

    const savedTheme = localStorage.getItem(THEME_KEY) || "light";
    applyTheme(savedTheme);

    themeBtn.addEventListener("click", () => {
      const current = document.documentElement.classList.contains("dark") ? "dark" : "light";
      const next = current === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    // --- Initial load -------------------------------------------------------
    refreshOpenSelect();
    if (activeId && docs[activeId]) {
      loadDoc(activeId);
    } else {
      const starter = `
<h1><strong>opaso - text</strong></h1>
<p>Paste Markdown (with equations) or just start typing like a word processor.</p>

<h2><strong>Speed, Distance, Time</strong></h2>
<ul>
  <li>$Distance = Speed \\times Time$</li>
  <li>$Speed = \\frac{Distance}{Time}$</li>
  <li>$Time = \\frac{Distance}{Speed}$</li>
</ul>

<h2><strong>Algebra</strong></h2>
<ul>
  <li><strong>Slope (Gradient):</strong> $m = \\frac{rise}{run} = \\frac{y_2 - y_1}{x_2 - x_1}$</li>
  <li><strong>Midpoint:</strong> $(\\frac{x_1 + x_2}{2}, \\frac{x_1 + x_2}{2})$</li>
</ul>

<h2><strong>Other</strong></h2>
<ul>
  <li><strong>Mean (Average):</strong> $\\frac{\\text{Sum of numbers}}{\\text{Total count}}$</li>
  <li><strong>Sum of Angles in Polygon:</strong> $(n - 2) \\times 180^\\circ$</li>
</ul>
`;
      editor.innerHTML = starter;
      typesetMath();
    }
  </script>
</body>
</html>
